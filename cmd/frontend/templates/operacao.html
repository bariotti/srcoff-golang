<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SRCOff — Operação</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 32px; }
    section { margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; border-radius: 6px; }
    h2 { font-size: 1.1rem; margin-top: 0; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; }
    input[type="date"] { padding: 6px 10px; font-size: 1rem; margin-right: 8px; }
    button { padding: 7px 18px; font-size: 1rem; cursor: pointer; }
    .msg-ok  { color: green; margin-top: 10px; }
    .msg-err { color: red;   margin-top: 10px; }
  </style>
</head>
<body>
  <h1>SRCOff — Operação</h1>

  <section>
    <h2>Gerar Movimento Contábil</h2>
    <form method="POST" action="/operacao/movimento">
      <label for="data-movimento">Data</label>
      <input type="date" id="data-movimento" name="data" required>
      <button type="submit">Processar</button>
    </form>
    {{if .MensagemMovimento}}
    <p class="msg-ok">{{.MensagemMovimento}}</p>
    {{end}}
    {{if .ErroMovimento}}
    <p class="msg-err">{{.ErroMovimento}}</p>
    {{end}}
  </section>

  <section>
    <h2>Gerar Estorno</h2>
    <form method="POST" action="/operacao/estorno">
      <label for="data-estorno">Data</label>
      <input type="date" id="data-estorno" name="data" required>
      <button type="submit">Estornar</button>
    </form>
    {{if .MensagemEstorno}}
    <p class="msg-ok">{{.MensagemEstorno}}</p>
    {{end}}
    {{if .ErroEstorno}}
    <p class="msg-err">{{.ErroEstorno}}</p>
    {{end}}
  </section>
</body>
</html>
